<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Njia — Data-Driven Career Pathway</title>
  <meta name="description" content="Njia helps Kenyan youth make evidence-based career pathway decisions using a research-backed career psychology and life-design method, combined with Kenyan institutional data.">
  <meta name="theme-color" content="#0f172a">

  <!-- Open Graph / social share preview (WhatsApp, Facebook, etc.) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Njia — Data-Driven Career Pathway for Kenyan Youth">
  <meta property="og:description" content="A free, evidence-based career diagnostic built on research-backed career psychology and life-design methods — matched against real Kenyan courses, fees and funding.">
  <meta property="og:image" content="https://njiacareerpathways.netlify.app/icons/og-image.jpg">
  <meta property="og:url" content="https://njiacareerpathways.netlify.app/">
  <meta property="og:site_name" content="Njia">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Njia — Data-Driven Career Pathway for Kenyan Youth">
  <meta name="twitter:description" content="A free, evidence-based career diagnostic built on research-backed career psychology and life-design methods — matched against real Kenyan courses, fees and funding.">
  <meta name="twitter:image" content="https://njiacareerpathways.netlify.app/icons/og-image.jpg">

  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon-192x192.png">
  <link rel="apple-touch-icon" href="./icons/icon-192x192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="logo">
        <img class="logo-mark" src="./icons/logo-mark-128.png" alt="" aria-hidden="true">
        <span>Njia</span>
        <span id="header-page-label" class="header-page-label" aria-live="polite"></span>
      </div>
      <button type="button" class="header-btn" id="privacy-btn" aria-label="Privacy and data" onclick="openPrivacyModal()">🔒</button>
    </header>

    <section id="install-banner" class="install-banner hidden" aria-label="Install Njia">
      <span class="install-banner-text">📲 Install Njia for one-tap, offline access</span>
      <div class="install-banner-actions">
        <button type="button" class="btn btn-primary btn-sm" onclick="triggerInstallPrompt()">Install</button>
        <button type="button" class="header-btn" aria-label="Dismiss install banner" onclick="dismissInstallBanner()">✕</button>
      </div>
    </section>

    <main>
      <div class="page" id="page-home"></div>
      <div class="page" id="page-discover"></div>
      <div class="page" id="page-design"></div>
      <div class="page" id="page-decide"></div>
      <div class="page" id="page-connect"></div>
      <div class="page" id="page-track"></div>
    </main>

    <nav class="bottom-nav" aria-label="Main navigation">
      <button type="button" class="nav-item" data-page="home" aria-label="Home">
        <span class="nav-icon" aria-hidden="true">🏠</span><span class="nav-label">Home</span>
      </button>
      <button type="button" class="nav-item" data-page="discover" aria-label="Discover">
        <span class="nav-icon" aria-hidden="true">🧭</span><span class="nav-label">Discover</span>
      </button>
      <button type="button" class="nav-item" data-page="design" aria-label="Design">
        <span class="nav-icon" aria-hidden="true">🎨</span><span class="nav-label">Design</span>
      </button>
      <button type="button" class="nav-item" data-page="decide" aria-label="Decide">
        <span class="nav-icon" aria-hidden="true">📊</span><span class="nav-label">Decide</span>
      </button>
      <button type="button" class="nav-item" data-page="connect" aria-label="Connect">
        <span class="nav-icon" aria-hidden="true">🤝</span><span class="nav-label">Connect</span>
      </button>
      <button type="button" class="nav-item" data-page="track" aria-label="Track">
        <span class="nav-icon" aria-hidden="true">📈</span><span class="nav-label">Track</span>
      </button>
    </nav>
  </div>

  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-sheet" role="dialog" aria-modal="true">
      <div class="modal-header">
        <span class="caption">Njia</span>
        <button type="button" class="modal-close" id="modal-close-btn" aria-label="Close">✕</button>
      </div>
      <div id="modal-sheet-content"></div>
    </div>
  </div>

  <!-- Static form so Netlify's build-time scanner registers this form (see
       Site configuration -> Forms in the Netlify dashboard to view
       submissions; the feature must be enabled there). Actual submission
       happens via fetch() in submitFeedback(), not a real form post. -->
  <form name="njia-feedback" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="text" name="rating">
    <input type="text" name="page">
    <textarea name="comment"></textarea>
    <input type="text" name="bot-field">
    <button type="submit">Send</button>
  </form>

  <form name="njia-partner-inquiry" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="text" name="organisation">
    <input type="text" name="contact">
    <input type="email" name="email">
    <input type="text" name="type">
    <textarea name="message"></textarea>
    <input type="text" name="bot-field">
    <button type="submit">Send</button>
  </form>

  <!-- Data layer -->
  <script src="./data/questions.js"></script>
  <script src="./data/institutions.js"></script>
  <script src="./data/courses.js"></script>
  <script src="./data/funding.js"></script>

  <!-- App shell + modules -->
  <script src="./js/app.js"></script>
  <script src="./js/discover.js"></script>
  <script src="./js/design.js"></script>
  <script src="./js/decide.js"></script>
  <script src="./js/connect.js"></script>
  <script src="./js/track.js"></script>

  <script>
    function openPrivacyModal() {
      openModal(`
        <h3 class="mb-2">Your Data & Privacy</h3>
        <p class="text-secondary text-sm mb-2">Everything you enter in Njia — questionnaire answers, plans, saved courses, OKRs — stays on this device in your browser's local storage. Nothing is sent to a server or shared with anyone.</p>
        <p class="text-secondary text-sm mb-2">Switching phones? Export a backup below and import it on the new device — nothing here syncs automatically.</p>
        <div class="btn-row mb-2">
          <button type="button" class="btn btn-secondary" onclick="exportMyData()">⬇ Export Backup</button>
          <button type="button" class="btn btn-secondary" onclick="document.getElementById('import-file-input').click()">⬆ Import Backup</button>
        </div>
        <input type="file" id="import-file-input" accept="application/json" class="hidden" onchange="importMyData(this.files[0])">
        <p class="text-secondary text-sm mb-2">If you're using a shared or borrowed phone, use "Clear My Data" below before handing it back.</p>
        <button type="button" class="btn btn-danger" onclick="confirmClearAllData()">Clear My Data</button>
      `);
    }
    function exportMyData() {
      const blob = new Blob([JSON.stringify(AppState, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `njia-backup-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast('Backup downloaded.', 'success');
    }
    function importMyData(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        let parsed;
        try {
          parsed = JSON.parse(reader.result);
        } catch (err) {
          showToast('That file is not a valid Njia backup.', 'error');
          return;
        }
        if (typeof parsed !== 'object' || parsed === null || !('questionnaire' in parsed)) {
          showToast('That file does not look like a Njia backup.', 'error');
          return;
        }
        AppState = Object.assign(defaultState(), parsed);
        saveState();
        closeModal();
        showToast('Backup restored.', 'success');
        navigateTo('home');
      };
      reader.onerror = () => showToast('Could not read that file.', 'error');
      reader.readAsText(file);
    }
    function confirmClearAllData() {
      openModal(`
        <h3 class="mb-2">Clear all Njia data?</h3>
        <p class="text-secondary mb-3">This permanently deletes your Discovery results, Odyssey Plans, saved courses, OKRs and applications from this device. This cannot be undone.</p>
        <div class="btn-row">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="button" class="btn btn-danger" onclick="clearAllDataConfirmed()">Delete Everything</button>
        </div>
      `);
    }
    function clearAllDataConfirmed() {
      resetState();
      closeModal();
      showToast('All data cleared.', 'success');
      navigateTo('home');
    }
    function openMethodologyModal() {
      openModal(`
        <h3 class="mb-2">The Njia Method &amp; Data Sources</h3>
        <p class="text-secondary text-sm mb-2"><strong>Career Psychology (Four Elements).</strong> Scores your Identity (strengths), Community (ideal environment), Necessity (real constraints) and Horizon (long-term vision) — a model refined through decades of executive coaching research into what actually predicts career fit.</p>
        <p class="text-secondary text-sm mb-2"><strong>Life Design (Odyssey Planning).</strong> Rather than forcing one linear plan, you sketch three: the path you're already on, the path you'd take if it disappeared, and the path you'd take if money were no object. Committing too early is a leading cause of career regret — prototyping multiple futures first is how design strategists avoid it.</p>
        <p class="text-secondary text-sm mb-2"><strong>Strategic Life Portfolio.</strong> The same rigour used in corporate strategy, applied to a life: auditing how your time and energy actually split across health, work, play and relationships, then making deliberate trade-offs instead of drifting.</p>
        <p class="text-secondary text-sm mb-2"><strong>Landing page statistics</strong> (KCSE candidates, KUCCPS placement rate, youth unemployment) are cited to KUCCPS, the Ministry of Education, and a World Bank/ILO modeled estimate — see the footer for full citations.</p>
        <p class="text-secondary text-sm mb-2"><strong>In-app course, fee and funding data</strong> (Decide module) is mostly illustrative for this MVP — institution names are real, but fees, employment rates and salaries are estimates not yet verified against live TVETA/CUE/KNBS sources. A handful of records (marked "✓ Verified estimate") have been cross-checked against a public source (e.g. HELB's 2025/26 funding model, published KMTC and university fee ranges) and carry a citation — but even those are ranges or mid-estimates, not an institution's exact published figure. Always confirm directly before deciding.</p>
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Close</button>
      `);
    }
    function openTermsModal() {
      openModal(`
        <h3 class="mb-2">Terms of Use</h3>
        <p class="text-secondary text-sm mb-2">Njia is provided free, "as is", for informational and educational purposes only. It is not professional career counselling, financial, or legal advice — always verify institution accreditation, fees and funding details directly with the relevant institution or authority before making a decision.</p>
        <p class="text-secondary text-sm mb-2">Njia is an independent project. It is not affiliated with, endorsed by, or sponsored by any institution, funder, or organisation named or listed in the app — those names are used solely to describe real, publicly available institutions or public information.</p>
        <p class="text-secondary text-sm mb-2">All your data (questionnaire answers, plans, saved courses, OKRs, applications) is stored only in this browser's local storage on your device. No account is required and Njia does not collect or receive your data on any server.</p>
        <p class="text-secondary text-sm mb-2">Course, institution and funding data bundled in this version is illustrative pending verification (see Methodology) and may contain errors. You are responsible for verifying information and for decisions made using this tool. Njia is provided without warranty of any kind, and content may change or be discontinued at any time.</p>
        <p class="text-secondary text-sm mb-2">By using Njia, you agree to these terms.</p>
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Close</button>
      `);
    }
    function openPartnersModal() {
      openModal(`
        <h3 class="mb-2">Products &amp; Partners</h3>
        <p class="text-secondary text-sm mb-2"><strong>Products.</strong> Njia is currently one free product suite: five modules — Discover, Design, Decide, Connect, Track — covering career diagnosis, life design, course/funding matching, outreach, and follow-through. All run client-side, with no account or backend required.</p>
        <p class="text-secondary text-sm mb-2"><strong>Partners.</strong> Njia does not yet have any formal institutional, government, or NGO partners — this is an independently built, early-stage project. Institution names shown in the Decide module are included because they are real, publicly known Kenyan institutions, not because of any partnership or endorsement.</p>
        <p class="text-secondary text-sm mb-2">Looking ahead, the kind of partnerships that would most improve Njia are: accredited institutions willing to share verified fee/outcome data, funders (HELB, county bursary offices, foundations) for direct integration, and youth or community organisations for real mentor matching.</p>
        <button type="button" class="btn btn-primary mb-2" onclick="openPartnerInquiryModal()">🤝 Partner With Us</button>
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Close</button>
      `);
    }
    function openPartnerInquiryModal() {
      openModal(`
        <h3 class="mb-2">Partner With Us</h3>
        <p class="text-secondary text-sm mb-2">Institution, funder, NGO, government body, or employer — tell us a bit about what you have in mind. No commitment, just a starting conversation.</p>
        <label class="caption" for="partner-org">Organisation name</label>
        <input type="text" id="partner-org" placeholder="e.g. Equity Group Foundation" style="width:100%;min-height:44px;margin:0.4rem 0 0.8rem;background:var(--bg-card);border:1px solid var(--border-light);border-radius:8px;color:var(--text-primary);padding:0.5rem">
        <label class="caption" for="partner-contact">Your name</label>
        <input type="text" id="partner-contact" placeholder="Your name" style="width:100%;min-height:44px;margin:0.4rem 0 0.8rem;background:var(--bg-card);border:1px solid var(--border-light);border-radius:8px;color:var(--text-primary);padding:0.5rem">
        <label class="caption" for="partner-email">Email</label>
        <input type="email" id="partner-email" placeholder="you@organisation.org" style="width:100%;min-height:44px;margin:0.4rem 0 0.8rem;background:var(--bg-card);border:1px solid var(--border-light);border-radius:8px;color:var(--text-primary);padding:0.5rem">
        <label class="caption" for="partner-type">Type of partnership</label>
        <select id="partner-type" style="width:100%;min-height:44px;margin:0.4rem 0 0.8rem;background:var(--bg-card);border:1px solid var(--border-light);border-radius:8px;color:var(--text-primary);padding:0.5rem">
          <option value="institution">Accredited institution (data sharing)</option>
          <option value="funder">Funder / bursary / scholarship body</option>
          <option value="government">Government / county body</option>
          <option value="ngo">NGO / youth organisation</option>
          <option value="employer">Employer</option>
          <option value="other">Other</option>
        </select>
        <label class="caption" for="partner-message">Message</label>
        <textarea class="q-input mt-1" id="partner-message" placeholder="What did you have in mind?"></textarea>
        <button type="button" class="btn btn-primary mt-2" onclick="submitPartnerInquiry()">Send Inquiry</button>
      `);
    }
    function submitPartnerInquiry() {
      const org = document.getElementById('partner-org')?.value.trim();
      const contact = document.getElementById('partner-contact')?.value.trim();
      const email = document.getElementById('partner-email')?.value.trim();
      const type = document.getElementById('partner-type')?.value;
      const message = document.getElementById('partner-message')?.value.trim();
      if (!org || !contact || !email || !message) {
        showToast('Please fill in organisation, name, email and a short message.', 'error');
        return;
      }
      const body = new URLSearchParams({
        'form-name': 'njia-partner-inquiry',
        organisation: org,
        contact,
        email,
        type,
        message
      }).toString();
      fetch('/', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body })
        .then(() => showToast('Thanks — we\'ll be in touch.', 'success'))
        .catch(() => showToast('Could not send — check your connection and try again.', 'error'));
      closeModal();
    }
    function openFaqModal() {
      openModal(`
        <h3 class="mb-2">Frequently Asked Questions</h3>
        <p class="text-secondary text-sm mb-2"><strong>Is Njia really free?</strong><br>Yes — completely free, no signup, no ads, no paywall.</p>
        <p class="text-secondary text-sm mb-2"><strong>Does my data leave my phone?</strong><br>No. Everything is stored in your browser's local storage, on your device only.</p>
        <p class="text-secondary text-sm mb-2"><strong>Do I need internet to use it?</strong><br>Only for your first visit. After that, Njia works fully offline.</p>
        <p class="text-secondary text-sm mb-2"><strong>Is the course/fee data accurate?</strong><br>Institution names are real, but fees, employment rates and salaries are illustrative estimates for this early version — always confirm directly with the institution before deciding. See Methodology.</p>
        <p class="text-secondary text-sm mb-2"><strong>What if my KCSE grade isn't great?</strong><br>Discover and the Course Matcher are built around this — they surface certificate and TVET pathways too, not just university degrees, and adapt to your actual grade and budget.</p>
        <p class="text-secondary text-sm mb-2"><strong>How is this different from a personality quiz?</strong><br>It's built on three research-backed methodologies — career psychology, life design and strategic life-portfolio planning (see Methodology) — and every recommendation is checked against real Kenyan grade requirements, fees and funding, not just a personality label.</p>
        <p class="text-secondary text-sm mb-2"><strong>Can I use this on a shared or borrowed phone?</strong><br>Yes — use "Clear My Data" (lock icon in the header) before handing the phone back.</p>
        <p class="text-secondary text-sm mb-2"><strong>Can I retake the Discover questionnaire?</strong><br>Yes, any time, from the results screen.</p>
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Close</button>
      `);
    }
    function openFeedbackModal() {
      openModal(`
        <h3 class="mb-2">Quick feedback</h3>
        <p class="text-secondary text-sm mb-2">Optional and anonymous — helps improve Njia. No reply, no account needed.</p>
        <div class="btn-row mb-2">
          <button type="button" class="btn btn-secondary" id="feedback-up" onclick="selectFeedbackRating('up')">👍 Helpful</button>
          <button type="button" class="btn btn-secondary" id="feedback-down" onclick="selectFeedbackRating('down')">👎 Not helpful</button>
        </div>
        <textarea class="q-input" id="feedback-comment" placeholder="Anything specific? (optional)"></textarea>
        <button type="button" class="btn btn-primary mt-2" onclick="submitFeedback()">Send Feedback</button>
      `);
    }
    let selectedFeedbackRating = null;
    function selectFeedbackRating(rating) {
      selectedFeedbackRating = rating;
      document.getElementById('feedback-up')?.classList.toggle('btn-primary', rating === 'up');
      document.getElementById('feedback-up')?.classList.toggle('btn-secondary', rating !== 'up');
      document.getElementById('feedback-down')?.classList.toggle('btn-primary', rating === 'down');
      document.getElementById('feedback-down')?.classList.toggle('btn-secondary', rating !== 'down');
    }
    function submitFeedback() {
      const comment = document.getElementById('feedback-comment')?.value.trim() || '';
      if (!selectedFeedbackRating && !comment) {
        showToast('Pick a rating or add a comment first.', 'error');
        return;
      }
      const body = new URLSearchParams({
        'form-name': 'njia-feedback',
        rating: selectedFeedbackRating || 'none',
        page: AppState.currentPage,
        comment
      }).toString();
      fetch('/', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body })
        .then(() => showToast('Thanks for the feedback!', 'success'))
        .catch(() => showToast('Could not send feedback — check your connection.', 'error'));
      selectedFeedbackRating = null;
      closeModal();
    }
  </script>
</body>
</html>
