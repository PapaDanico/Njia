<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Njia — Data-Driven Career Pathway</title>
  <meta name="description" content="Njia helps Kenyan youth make evidence-based career pathway decisions using Stanford, HBR and HBS frameworks combined with Kenyan institutional data.">
  <meta name="theme-color" content="#0f172a">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon-192x192.png">
  <link rel="apple-touch-icon" href="./icons/icon-192x192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="logo">
        <span class="logo-mark" aria-hidden="true"></span>
        <span>Njia</span>
      </div>
      <button class="header-btn" id="privacy-btn" aria-label="Privacy and data" onclick="openPrivacyModal()">🔒</button>
    </header>

    <main>
      <div class="page" id="page-home"></div>
      <div class="page" id="page-discover"></div>
      <div class="page" id="page-design"></div>
      <div class="page" id="page-decide"></div>
      <div class="page" id="page-connect"></div>
      <div class="page" id="page-track"></div>
    </main>

    <nav class="bottom-nav" aria-label="Main navigation">
      <button class="nav-item" data-page="home" aria-label="Home">
        <span class="nav-icon" aria-hidden="true">🏠</span><span class="nav-label">Home</span>
      </button>
      <button class="nav-item" data-page="discover" aria-label="Discover">
        <span class="nav-icon" aria-hidden="true">🧭</span><span class="nav-label">Discover</span>
      </button>
      <button class="nav-item" data-page="design" aria-label="Design">
        <span class="nav-icon" aria-hidden="true">🎨</span><span class="nav-label">Design</span>
      </button>
      <button class="nav-item" data-page="decide" aria-label="Decide">
        <span class="nav-icon" aria-hidden="true">📊</span><span class="nav-label">Decide</span>
      </button>
      <button class="nav-item" data-page="connect" aria-label="Connect">
        <span class="nav-icon" aria-hidden="true">🤝</span><span class="nav-label">Connect</span>
      </button>
      <button class="nav-item" data-page="track" aria-label="Track">
        <span class="nav-icon" aria-hidden="true">📈</span><span class="nav-label">Track</span>
      </button>
    </nav>
  </div>

  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <div class="modal-overlay" id="modal-overlay" aria-hidden="true">
    <div class="modal-sheet" role="dialog" aria-modal="true">
      <div class="modal-header">
        <span class="caption">Njia</span>
        <button class="modal-close" id="modal-close-btn" aria-label="Close">✕</button>
      </div>
      <div id="modal-sheet-content"></div>
    </div>
  </div>

  <!-- Data layer -->
  <script src="./data/questions.js"></script>
  <script src="./data/institutions.js"></script>
  <script src="./data/courses.js"></script>
  <script src="./data/funding.js"></script>

  <!-- App shell + modules -->
  <script src="./js/app.js"></script>
  <script src="./js/discover.js"></script>
  <script src="./js/design.js"></script>
  <script src="./js/decide.js"></script>
  <script src="./js/connect.js"></script>
  <script src="./js/track.js"></script>

  <script>
    function openPrivacyModal() {
      openModal(`
        <h3 class="mb-2">Your Data & Privacy</h3>
        <p class="text-secondary text-sm mb-2">Everything you enter in Njia — questionnaire answers, plans, saved courses, OKRs — stays on this device in your browser's local storage. Nothing is sent to a server or shared with anyone.</p>
        <p class="text-secondary text-sm mb-2">If you're using a shared or borrowed phone, use "Clear My Data" below before handing it back.</p>
        <button class="btn btn-danger" onclick="confirmClearAllData()">Clear My Data</button>
      `);
    }
    function confirmClearAllData() {
      openModal(`
        <h3 class="mb-2">Clear all Njia data?</h3>
        <p class="text-secondary mb-3">This permanently deletes your Discovery results, Odyssey Plans, saved courses, OKRs and applications from this device. This cannot be undone.</p>
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-danger" onclick="clearAllDataConfirmed()">Delete Everything</button>
        </div>
      `);
    }
    function clearAllDataConfirmed() {
      resetState();
      closeModal();
      showToast('All data cleared.', 'success');
      navigateTo('home');
    }
    function openMethodologyModal() {
      openModal(`
        <h3 class="mb-2">Methodology &amp; Data Sources</h3>
        <p class="text-secondary text-sm mb-2"><strong>Frameworks:</strong> Stanford Life Design Lab's Odyssey Planning, Rainer Strack's "Strategize Your Life" (HBR/BCG), and Dr. Timothy Butler's Four Elements career model (Harvard Business School).</p>
        <p class="text-secondary text-sm mb-2"><strong>Landing page statistics</strong> (KCSE candidates, KUCCPS placement rate, youth unemployment) are cited to KUCCPS, the Ministry of Education, and a World Bank/ILO modeled estimate — see the footer for full citations.</p>
        <p class="text-secondary text-sm mb-2"><strong>In-app course, fee and funding data</strong> (Decide module) is illustrative for this MVP — institution names are real, but fees, employment rates and salaries are not yet verified against live TVETA/CUE/KNBS sources. A disclaimer appears wherever this data is shown.</p>
        <button class="btn btn-secondary" onclick="closeModal()">Close</button>
      `);
    }
  </script>
</body>
</html>
